site_name: tsam_xarray
site_url: https://tsam_xarray.readthedocs.io/
repo_url: https://github.com/FBumann/tsam_xarray

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Fira Code
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - search.suggest

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
      execute: true
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: examples/getting-started.ipynb
  - Examples:
      - Stack Dims: examples/stack-dims.ipynb
      - Slice Dims: examples/slice-dims.ipynb
      - Weights: examples/weights.ipynb
      - Accuracy: examples/accuracy.ipynb
  - API Reference: api.md
  - Changelog: changelog.md

watch:
  - src
  - docs
